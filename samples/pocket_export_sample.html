<!DOCTYPE html>
<!--
  Synthetic Pocket export sample (no personal data).
  Format mirrors Pocket's real "Export HTML" output: a Netscape-bookmark-style
  document with <a> tags carrying href, time_added (unix seconds), and tags.
-->
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <title>Pocket Export</title>
</head>
<body>
  <h1>Unread</h1>
  <ul>
    <li><a href="https://www.gnu.org/philosophy/free-sw.en.html" time_added="1633024800" tags="foss,philosophy">What is Free Software?</a></li>
    <li><a href="https://www.rfc-editor.org/rfc/rfc2616" time_added="1638316800" tags="web,protocols">RFC 2616: HTTP/1.1</a></li>
    <li><a href="https://en.wikipedia.org/wiki/Full-text_search" time_added="1640995200" tags="databases,search">Full-text search</a></li>
  </ul>

  <h1>Read Archive</h1>
  <ul>
    <li><a href="https://www.postgresql.org/docs/current/textsearch-intro.html" time_added="1609459200" tags="postgres,search">PostgreSQL: Full Text Search</a></li>
    <li><a href="https://example.com/a-dead-link-that-will-fail" time_added="1612137600" tags="test">A link that will fail extraction</a></li>
  </ul>
</body>
</html>
